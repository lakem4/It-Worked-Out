kind = "web"
previewPath = "/"
title = "It Worked Out"
version = "1.0.0"
id = "artifacts/it-worked-out"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20815

[services.development]
run = "pnpm --filter @workspace/it-worked-out run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/it-worked-out", "run", "build" ]
publicDir = "artifacts/it-worked-out/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20815"
BASE_PATH = "/"
